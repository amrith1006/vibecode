<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibecode.ai | Current Openings</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="background-overlay"></div>

    <header class="glass-header">
        <div class="logo">
            <svg class="header-logo-svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                style="color: var(--primary-blue); margin-right: 8px;">
                <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                <path d="M2 17l10 5 10-5"></path>
                <path d="M2 12l10 5 10-5"></path>
            </svg>
            Vibecode.ai
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="jobs.html" class="active">Current Openings</a>
            <a href="post-job.html" class="btn-primary">Post a Job</a>
        </nav>
    </header>

    <main class="page-transition" style="padding-top: 3rem;">
        <section id="jobs" class="job-list-section">
            <h2>Current Openings</h2>
            <p style="color: var(--text-muted); margin-bottom: 2rem;">Join our innovative remote teams across the globe.
            </p>
            <div id="job-container" class="job-table-container">
                <table class="job-table">
                    <thead>
                        <tr>
                            <th>Company Name</th>
                            <th>Job Title</th>
                            <th>Description</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="job-tbody">
                        <tr>
                            <td colspan="4" class="loading">Loading positions...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <div style="text-align: center; margin-top: 4rem;">
            <a href="post-job.html" class="btn-primary" style="font-size: 1.2rem; padding: 1rem 3rem;">Post a New Job
                ✨</a>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Vibecode.ai Technologies. All rights reserved.</p>
    </footer>

    <script src="app.js"></script>
</body>

</html>
